<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Form Order PLB</title>
    <style>
        :root {
            --primary: #25D366; /* Warna khas WhatsApp */
            --bg: #f4f7f6;
            --text: #333;
            --border: #ccc;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }
        .header {
            background-color: var(--primary);
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .page {
            display: none;
            padding: 20px;
            animation: fadeIn 0.3s ease-in-out;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px; /* Mencegah auto-zoom di iOS */
        }
        .contact-group {
            display: flex;
            gap: 10px;
        }
        .btn-contact {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 15px;
            font-size: 20px;
            cursor: pointer;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }
        button.nav-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            margin: 0 5px;
        }
        .btn-next { background-color: #333; color: white; }
        .btn-prev { background-color: #ccc; color: #333; }
        .btn-wa { background-color: var(--primary); color: white; width: 100%; padding: 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; margin-top: 20px; cursor: pointer;}
        
        /* Preview Textarea */
        #previewText {
            background-color: #e9ecef;
            color: #555;
            font-family: monospace;
            height: 250px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="header">Input Sales Order</div>

    <!-- HALAMAN 1 -->
    <div id="page1" class="page active">
        <div class="form-group">
            <label>PIC</label>
            <input type="text" id="pic" value="Dindin Abdul Qodir">
        </div>
        <div class="form-group">
            <label>Nama Customer</label>
            <div class="contact-group">
                <input type="text" id="customer" placeholder="Nama & No HP">
                <button type="button" class="btn-contact" onclick="ambilKontak()">👤</button>
            </div>
        </div>
        <div class="form-group">
            <label>Nama Surat Jalan</label>
            <input type="text" id="surat_jalan">
        </div>
        <div class="nav-buttons">
            <button class="nav-btn btn-next" onclick="pindahHalaman(1, 2)">Lanjut</button>
        </div>
    </div>

    <!-- HALAMAN 2 -->
    <div id="page2" class="page">
        <div class="form-group">
            <label>Alamat</label>
            <input type="text" id="alamat">
        </div>
        <div class="form-group">
            <label>Jumlah Orderan (netto)</label>
            <input type="number" id="jumlah" placeholder="Contoh: 700000">
        </div>
        <div class="form-group">
            <label>Salinitas</label>
            <input type="text" id="salinitas" placeholder="Contoh: 30 - 33">
        </div>
        <div class="nav-buttons">
            <button class="nav-btn btn-prev" onclick="pindahHalaman(2, 1)">Kembali</button>
            <button class="nav-btn btn-next" onclick="pindahHalaman(2, 3)">Lanjut</button>
        </div>
    </div>

    <!-- HALAMAN 3 -->
    <div id="page3" class="page">
        <div class="form-group">
            <label>Tanggal Tebar</label>
            <input type="date" id="tgl_tebar">
        </div>
        <div class="form-group">
            <label>Jam Tebar</label>
            <input type="text" id="jam_tebar" value="ikut jadwal pesawat">
        </div>
        <div class="form-group">
            <label>Kendaraan</label>
            <select id="kendaraan">
                <option value="via pesawat">via pesawat</option>
                <option value="via darat">via darat</option>
            </select>
        </div>
        <div class="form-group">
            <label>Noted</label>
            <textarea id="noted" rows="3"></textarea>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn btn-prev" onclick="pindahHalaman(3, 2)">Kembali</button>
            <button class="nav-btn btn-next" onclick="siapkanWA()">Review & Kirim</button>
        </div>
    </div>

    <!-- HALAMAN 4 (REVIEW & KIRIM WA) -->
    <div id="page4" class="page">
        <div class="form-group">
            <label>Preview Pesan</label>
            <textarea id="previewText" readonly></textarea>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn btn-prev" onclick="pindahHalaman(4, 3)">Edit Data</button>
        </div>
        <button class="btn-wa" onclick="kirimWA()">Bagikan ke WhatsApp</button>
    </div>

    <script>
        // Logika Navigasi Pindah Halaman
        function pindahHalaman(dari, ke) {
            document.getElementById('page' + dari).classList.remove('active');
            document.getElementById('page' + ke).classList.add('active');
        }

        // Logika Akses Kontak HP
        async function ambilKontak() {
            const props = ['name', 'tel'];
            const opts = { multiple: false };
            try {
                if ('contacts' in navigator && 'ContactsManager' in window) {
                    const contacts = await navigator.contacts.select(props, opts);
                    if (contacts.length > 0) {
                        const nama = contacts[0].name[0] || '';
                        const tel = (contacts[0].tel && contacts[0].tel.length > 0) ? contacts[0].tel[0] : '';
                        document.getElementById('customer').value = `${nama} ${tel}`.trim();
                    }
                } else {
                    alert('Browser Anda tidak mendukung fitur akses kontak otomatis. Harap ketik manual.');
                }
            } catch (ex) {
                alert('Terjadi kesalahan atau akses kontak ditolak.');
            }
        }

        // Format Tanggal Indonesia (Misal: 3 Mei 2026)
        function formatTanggal(dateStr) {
            if (!dateStr) return '';
            const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            const d = new Date(dateStr);
            return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
        }

        function getTanggalHariIni() {
            const today = new Date();
            const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            return `${today.getDate()} ${months[today.getMonth()]} ${today.getFullYear()}`;
        }

        let pesanWA_Final = "";

        // Logika Susun Teks Sesuai Format
        function siapkanWA() {
            const pic = document.getElementById('pic').value;
            const tgl_order = getTanggalHariIni();
            const customer = document.getElementById('customer').value;
            const surat_jalan = document.getElementById('surat_jalan').value;
            const alamat = document.getElementById('alamat').value;
            let jumlah = document.getElementById('jumlah').value;
            if(jumlah) {
                // Format angka dengan titik
                jumlah = Number(jumlah).toLocaleString('id-ID') + " netto";
            }
            const raw_tgl_tebar = document.getElementById('tgl_tebar').value;
            const tgl_tebar = formatTanggal(raw_tgl_tebar);
            const jam_tebar = document.getElementById('jam_tebar').value;
            const salinitas = document.getElementById('salinitas').value;
            const kendaraan = document.getElementById('kendaraan').value;
            const noted = document.getElementById('noted').value;

            pesanWA_Final = `SPESIFIKASI DETAIL ORDERAN
PIC 						                : ${pic}

TANGGAL ORDER : 
${tgl_order}

NAMA CUSTOMER	: ${customer}


NAMA SURAT JALAN : ${surat_jalan}

ALAMAT	 : ${alamat}

JUMLAH ORDERAN : ${jumlah}

TANGGAL TEBAR	 : ${tgl_tebar}

Jam Tebar : ${jam_tebar}

SALINITAS : 
${salinitas}

KENDARAAN 		: ${kendaraan}

NOTED			:
${noted}`;

            document.getElementById('previewText').value = pesanWA_Final;
            pindahHalaman(3, 4);
        }

        function kirimWA() {
            const encodedText = encodeURIComponent(pesanWA_Final);
            window.open(`https://wa.me/?text=${encodedText}`, '_blank');
        }
    </script>
</body>
</html>
